<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI YouTube Video Summarizer</title>
     
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-purple-200 min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-3xl bg-white shadow-xl rounded-2xl p-8 mt-6 mb-6">

        <h1 class="text-3xl font-bold text-center mb-3">
            AI YouTube Video Summarizer
        </h1>
 
        <p class="text-center text-gray-500 mb-6">
            Paste a YouTube link and get an AI-powered summary instantly.
        </p>

        <!-- Input Section -->
        <div class="flex flex-col sm:flex-row gap-3 mb-4">
            
        
            <input 
                type="text" 
                id="videoLink" 
                placeholder="https://www.youtube.com/watch?v=XXXXXXXXXXX"
                class="flex-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
            >
        
            <div class="relative w-full sm:w-auto">
    <!-- Display selected option -->
    <button id="lengthSelect" type="button"
        class="w-full px-4 py-2 border rounded-lg bg-white text-gray-800 focus:outline-none focus:ring-2 focus:ring-purple-500 flex justify-between items-center">
        <span id="selectedOption">Medium</span>
        <svg class="h-4 w-4 text-gray-400 ml-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
    </button>

    <!-- Options list -->
    <ul id="lengthOptions" class="absolute left-0 right-0 mt-1 bg-white border rounded-lg shadow-lg hidden z-10">
        <li data-value="short" class="px-4 py-2 hover:bg-purple-500 hover:text-white cursor-pointer">Short</li>
        <li data-value="medium" class="px-4 py-2 hover:bg-purple-500 hover:text-white cursor-pointer">Medium</li>
        <li data-value="detailed" class="px-4 py-2 hover:bg-purple-500 hover:text-white cursor-pointer">Detailed</li>
    </ul>
</div>

            <button 
                id="summarizeBtn"
                class="bg-purple-600 text-white px-6 py-2 rounded-lg hover:bg-purple-700 transition"
            >
                Summarize →
            </button>

        </div>
<p id="inputError" class="text-red-500 text-sm mb-2 hidden"></p>
        <!-- Bullet Option -->
        <div class="mb-6 mt-6">
            <label class="flex items-center gap-2 text-sm text-gray-600">
                <input type="checkbox" id="bulletMode" class="w-4 h-4 accent-purple-500">
                Generate in Bullet Points
            </label>
        </div>

        
          <!-- Result Section -->
<div class="mt-6">
    <h2 class="text-lg font-semibold mb-3">Summary Result</h2>

    <!-- Video Thumbnail + Title -->
    <div id="videoMeta" class="mb-4 hidden flex flex-col items-start gap-2">
        <div class="w-full overflow-hidden rounded-xl">
            <img id="videoThumbnail" class="w-full rounded-xl object-contain" />
        </div>
        <h3 id="videoTitle" class="text-xl font-semibold"></h3>
    </div>

    <!-- Summary Box -->
    <div class="bg-gray-100 p-4 rounded-xl min-h-[120px]">
        <p id="summaryText" class="whitespace-pre-line text-gray-800 text-left">
            Your summary will appear here...
        </p>
        <!-- Loading Spinner -->
    <div id="loadingSpinner" class="hidden mt-4 flex justify-center items-center">
        <svg class="animate-spin h-12 w-12 text-purple-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
        </svg>
    </div>
    </div>

    <div class="mt-4 flex justify-end">
        <button 
            id="copyBtn" disabled
            class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 transition"
        >
            Copy
        </button>
    </div>
</div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
